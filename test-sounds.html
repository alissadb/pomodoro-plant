<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sound Test - Pomodoro Plant</title>
  <style>
    body {
      font-family: 'Avenir Next', sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      background: linear-gradient(140deg, #f4fbe8, #d2f2e4);
      min-height: 100vh;
    }
    h1 {
      color: #1c2d24;
      text-align: center;
    }
    .container {
      background: rgba(255, 255, 248, 0.9);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 16px 34px rgba(29, 51, 40, 0.12);
    }
    button {
      display: block;
      width: 100%;
      padding: 20px;
      margin: 15px 0;
      font-size: 18px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 120ms ease;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    button:hover {
      transform: translateY(-2px);
    }
    button:active {
      transform: translateY(0);
    }
    .focus-btn {
      background: #2f7d4f;
      color: white;
    }
    .short-btn {
      background: #388d7a;
      color: white;
    }
    .long-btn {
      background: #4c6f9f;
      color: white;
    }
    .all-btn {
      background: #b64b3f;
      color: white;
      margin-top: 30px;
    }
    .info {
      background: rgba(47, 125, 79, 0.08);
      padding: 15px;
      border-radius: 10px;
      margin-top: 20px;
      font-size: 14px;
      color: #3f5a4c;
    }
    .duration {
      font-size: 14px;
      color: #666;
      font-weight: normal;
    }
    .status {
      text-align: center;
      margin-top: 20px;
      padding: 10px;
      border-radius: 8px;
      font-weight: 600;
      display: none;
    }
    .status.playing {
      display: block;
      background: rgba(47, 125, 79, 0.15);
      color: #2f7d4f;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎵 Sound Test</h1>
    <p style="text-align: center; color: #3f5a4c;">Test the different completion sounds</p>
    
    <button class="focus-btn" onclick="testFocus()">
      🎯 Focus Complete
      <div class="duration">5.6 seconds - Energetic celebration</div>
    </button>
    
    <button class="short-btn" onclick="testShort()">
      ☕ Short Break Complete
      <div class="duration">5 seconds - Gentle chime</div>
    </button>
    
    <button class="long-btn" onclick="testLong()">
      🌟 Long Break Complete
      <div class="duration">6.5 seconds - Triumphant fanfare</div>
    </button>
    
    <button class="all-btn" onclick="testAll()">
      🎼 Test All Sounds (in sequence)
    </button>
    
    <div id="status" class="status"></div>
    
    <div class="info">
      <strong>💡 Tip:</strong> Make sure your volume is on! Each sound is 5-7 seconds long.
      The sounds will play automatically when you click the buttons above.
    </div>
  </div>

  <script type="module">
    import { announceIntervalComplete } from './src/notifications.js';
    
    const statusEl = document.getElementById('status');
    const timerEl = document.createElement('div');
    
    function showStatus(message) {
      statusEl.textContent = message;
      statusEl.className = 'status playing';
      setTimeout(() => {
        statusEl.className = 'status';
      }, 8000);
    }
    
    window.testFocus = function() {
      showStatus('🎯 Playing Focus sound...');
      announceIntervalComplete(timerEl, "Focus session complete!", "focus");
    };
    
    window.testShort = function() {
      showStatus('☕ Playing Short Break sound...');
      announceIntervalComplete(timerEl, "Short break complete!", "short");
    };
    
    window.testLong = function() {
      showStatus('🌟 Playing Long Break sound...');
      announceIntervalComplete(timerEl, "Long break complete!", "long");
    };
    
    window.testAll = function() {
      showStatus('🎼 Playing all sounds: Focus → Short (7s) → Long (14s)');
      
      testFocus();
      
      setTimeout(() => {
        testShort();
      }, 7000);
      
      setTimeout(() => {
        testLong();
      }, 14000);
    };
  </script>
</body>
</html>
